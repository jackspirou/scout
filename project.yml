name: Scout
options:
  bundleIdPrefix: com.jackspirou
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  HighlighterSwift:
    url: https://github.com/smittytone/HighlighterSwift
    from: "3.0.0"

targets:
  CSearchfs:
    type: library.static
    supportedDestinations: [macOS]
    sources:
      - path: Sources/CSearchfs
    settings:
      base:
        HEADER_SEARCH_PATHS: $(SRCROOT)/Sources/CSearchfs/include
        MODULEMAP_FILE: $(SRCROOT)/Sources/CSearchfs/include/module.modulemap
        CLANG_ENABLE_MODULES: YES

  ScoutLib:
    type: framework
    supportedDestinations: [macOS]
    sources:
      - path: Sources/ScoutLib
        excludes:
          - Resources/Info.plist
          - Resources/Scout.entitlements
          - Resources/AppIcon.iconset
          - Resources/AppIcon.svg
          - Resources/AppIcon.icns
          - Resources/build
    resources:
      - path: Sources/ScoutLib/Resources/markdown-template.html
    settings:
      base:
        PRODUCT_NAME: ScoutLib
        PRODUCT_BUNDLE_IDENTIFIER: com.jackspirou.scout.lib
        SWIFT_VERSION: "5.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        DEFINES_MODULE: YES
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: CSearchfs
        link: true
      - package: HighlighterSwift
        product: Highlighter

  Scout:
    type: application
    supportedDestinations: [macOS]
    sources:
      - path: Sources/Scout
    resources:
      - path: Sources/ScoutLib/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jackspirou.scout
        INFOPLIST_FILE: Sources/ScoutLib/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/ScoutLib/Resources/Scout.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_NAME: Scout
        SWIFT_VERSION: "5.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
    dependencies:
      - target: ScoutLib
        embed: true

schemes:
  Scout:
    build:
      targets:
        Scout: all
    run:
      config: Debug
    archive:
      config: Release
