name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Show Swift version
        run: swift --version

      - name: Test
        run: swift test

      - name: Build .app bundle
        run: make app

      - name: Create DMG
        run: make dmg

      - name: Create zip
        run: ditto -c -k --sequesterRsrc --keepParent build/Scout.app Scout.app.zip

      - name: Generate changelog and commit docs
        run: |
          brew install git-cliff
          git-cliff --output CHANGELOG.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: update CHANGELOG.md for ${{ github.ref_name }}" || true
          git push origin HEAD:main || true

      - name: Determine prerelease
        id: prerelease
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == *-alpha* ]] || [[ "$TAG" == *-beta* ]] || [[ "$TAG" == *-rc* ]]; then
            echo "flag=true" >> "$GITHUB_OUTPUT"
          else
            echo "flag=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.flag == 'true' }}
          files: |
            build/Scout.dmg
            Scout.app.zip

      - name: Update Homebrew cask
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          SHA256=$(shasum -a 256 build/Scout.dmg | awk '{print $1}')

          CASK=$(cat <<EOF
          cask "scout" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/jackspirou/scout/releases/download/v#{version}/Scout.dmg"
            name "Scout"
            desc "Native macOS file manager built with Swift and AppKit"
            homepage "https://github.com/jackspirou/scout"

            app "Scout.app"

            zap trash: [
              "~/Library/Application Support/Scout",
              "~/Library/Preferences/com.jackspirou.scout.plist",
            ]
          end
          EOF
          )

          # Get current file SHA for the update API call
          FILE_SHA=$(gh api repos/jackspirou/homebrew-tap/contents/Casks/scout.rb --jq '.sha')

          # Update the cask file in the homebrew-tap repo
          echo "$CASK" | gh api repos/jackspirou/homebrew-tap/contents/Casks/scout.rb \
            --method PUT \
            --field message="chore: update Scout cask to ${VERSION}" \
            --field content="$(echo "$CASK" | base64)" \
            --field sha="$FILE_SHA" \
            --silent
        continue-on-error: true
