name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
            build/DerivedData/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Show Swift version
        run: swift --version

      - name: Test
        run: swift test

      - name: Set version from tag
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" Sources/ScoutLib/Resources/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" Sources/ScoutLib/Resources/Info.plist

      - name: Import code signing certificate
        env:
          DEVELOPER_ID_CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          # Decode the certificate
          echo "$DEVELOPER_ID_CERT_BASE64" | base64 --decode > "$CERT_PATH"

          # Create a temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the certificate
          security import "$CERT_PATH" -P "$DEVELOPER_ID_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list so codesign can find it
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Build .app bundle
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          make app \
            CODESIGN_IDENTITY="Developer ID Application: Jack Spirou ($APPLE_TEAM_ID)" \
            TEAM_ID="$APPLE_TEAM_ID"

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Create a zip for notarization
          ditto -c -k --sequesterRsrc --keepParent build/Scout.app build/Scout-notarize.zip

          # Submit for notarization and wait
          xcrun notarytool submit build/Scout-notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          # Staple the ticket to the app
          xcrun stapler staple build/Scout.app

          rm build/Scout-notarize.zip

      - name: Create DMG
        run: make dmg

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit build/Scout.dmg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple build/Scout.dmg

      - name: Create zip
        run: ditto -c -k --sequesterRsrc --keepParent build/Scout.app Scout.app.zip

      - name: Generate changelog and commit docs
        run: |
          brew install git-cliff
          git-cliff --output CHANGELOG.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: update CHANGELOG.md for ${{ github.ref_name }}" || true
          git push origin HEAD:main || true

      - name: Determine prerelease
        id: prerelease
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == *-alpha* ]] || [[ "$TAG" == *-beta* ]] || [[ "$TAG" == *-rc* ]]; then
            echo "flag=true" >> "$GITHUB_OUTPUT"
          else
            echo "flag=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.flag == 'true' }}
          files: |
            build/Scout.dmg
            Scout.app.zip

      - name: Update Homebrew cask
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          SHA256=$(shasum -a 256 build/Scout.dmg | awk '{print $1}')

          cat > /tmp/scout.rb << CASKEOF
          cask "scout" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/jackspirou/scout/releases/download/v#{version}/Scout.dmg"
            name "Scout"
            desc "Native macOS file manager built with Swift and AppKit"
            homepage "https://github.com/jackspirou/scout"

            app "Scout.app"

            zap trash: [
              "~/Library/Application Support/Scout",
              "~/Library/Preferences/com.jackspirou.scout.plist",
            ]
          end
          CASKEOF

          # Strip leading whitespace from heredoc
          sed -i '' 's/^          //' /tmp/scout.rb

          FILE_SHA=$(gh api repos/jackspirou/homebrew-tap/contents/Casks/scout.rb --jq '.sha')

          gh api repos/jackspirou/homebrew-tap/contents/Casks/scout.rb \
            --method PUT \
            --field message="chore: update Scout cask to ${VERSION}" \
            --field content="$(base64 -i /tmp/scout.rb)" \
            --field sha="$FILE_SHA" \
            --silent
        continue-on-error: true
