name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Show Swift version
        run: swift --version

      - name: Test
        run: swift test

      - name: Build .app bundle
        run: make app

      - name: Capture screenshot
        run: make screenshot
        continue-on-error: true

      - name: Create DMG
        run: make dmg

      - name: Create zip
        run: ditto -c -k --sequesterRsrc --keepParent build/Scout.app Scout.app.zip

      - name: Generate changelog and commit docs
        run: |
          brew install git-cliff
          git-cliff --output CHANGELOG.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git add docs/screenshot.png || true
          git commit -m "docs: update CHANGELOG.md and screenshot for ${{ github.ref_name }}" || true
          git push origin HEAD:main || true

      - name: Determine prerelease
        id: prerelease
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == *-alpha* ]] || [[ "$TAG" == *-beta* ]] || [[ "$TAG" == *-rc* ]]; then
            echo "flag=true" >> "$GITHUB_OUTPUT"
          else
            echo "flag=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.flag == 'true' }}
          files: |
            build/Scout.dmg
            Scout.app.zip
